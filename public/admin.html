<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — Laboratorio SDA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
    .topbar {
      background-color: #0a3d62;
      color: white;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar .brand { font-weight: 700; font-size: 1.2rem; }
    .topbar .brand span { color: #90caf9; }
    .btn-logout { background: transparent; border: 1px solid #90caf9; color: #90caf9; border-radius: 6px; padding: 4px 14px; cursor: pointer; }
    .btn-logout:hover { background-color: #90caf9; color: #0a3d62; }
    .nav-admin { background-color: #1a5276; padding: 10px 24px; display: flex; gap: 10px; flex-wrap: wrap; }
    .container-panel { max-width: 1100px; margin: 30px auto; padding: 0 16px; }
    .card-form { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .card-form .card-header { background-color: #0a3d62; color: white; border-radius: 12px 12px 0 0; font-weight: 600; }
    .table-container { border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    table { margin: 0; }
    thead { background-color: #0a3d62; color: white; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand"><i class="bi bi-eyedropper me-2"></i>Lab<span>SDA</span> — Panel de Administración</div>
  <a href="/auth/logout" class="btn-logout"><i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión</a>
</div>

<!-- MENÚ NAVEGACIÓN -->
<div class="nav-admin">
  <a href="/admin" class="btn btn-primary btn-sm"><i class="bi bi-people me-1"></i>Pacientes</a>
  <a href="/gestor_examenes.html" class="btn btn-success btn-sm"><i class="bi bi-file-earmark-medical me-1"></i>Gestión Exámenes</a>
  <a href="/resultados.html" class="btn btn-info btn-sm"><i class="bi bi-clipboard2-pulse me-1"></i>Resultados</a>
  <a href="/horarios.html" class="btn btn-warning btn-sm"><i class="bi bi-clock me-1"></i>Horarios</a>
</div>

<div class="container-panel">

  <!-- FORMULARIO AGREGAR / EDITAR -->
  <div class="card card-form">
    <div class="card-header py-3">
      <i class="bi bi-person-plus me-2"></i><span id="titulo-formulario">Agregar Paciente</span>
    </div>
    <div class="card-body">
      <input type="hidden" id="paciente-id">
      <div class="row g-3">
        <div class="col-md-2">
          <input type="text" id="input-rut" class="form-control" placeholder="RUT (ej: 12345678-9)">
        </div>
        <div class="col-md-2">
          <input type="text" id="input-nombre" class="form-control" placeholder="Nombre">
        </div>
        <div class="col-md-2">
          <input type="text" id="input-apellido" class="form-control" placeholder="Apellido">
        </div>
        <div class="col-md-2">
          <input type="date" id="input-fecha" class="form-control">
        </div>
        <div class="col-md-2">
          <input type="text" id="input-telefono" class="form-control" placeholder="Teléfono">
        </div>
        <div class="col-md-2">
          <input type="email" id="input-correo" class="form-control" placeholder="Correo">
        </div>
        <div class="col-12 d-flex gap-2">
          <button id="btn-guardar" class="btn btn-primary"><i class="bi bi-floppy me-1"></i>Guardar</button>
          <button id="btn-cancelar" class="btn btn-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</button>
        </div>
      </div>
      <div id="msg-validacion" class="text-danger mt-2" style="display:none;"></div>
    </div>
  </div>

  <!-- TABLA DE PACIENTES -->
  <div class="table-container">
    <table class="table table-striped table-hover bg-white mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>RUT</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>F. Nacimiento</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="cuerpo-tabla"></tbody>
    </table>
  </div>

</div>

<template id="plantilla-fila">
  <tr>
    <td class="col-id"></td>
    <td class="col-rut"></td>
    <td class="col-nombre"></td>
    <td class="col-apellido"></td>
    <td class="col-fecha"></td>
    <td class="col-telefono"></td>
    <td class="col-correo"></td>
    <td>
      <button class="btn btn-warning btn-sm me-1 btn-editar"><i class="bi bi-pencil"></i> Editar</button>
      <button class="btn btn-danger btn-sm btn-eliminar"><i class="bi bi-trash"></i> Eliminar</button>
    </td>
  </tr>
</template>

<script src="/js/pacientes.js"></script>
</body>
</html>
