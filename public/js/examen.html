<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exámenes de Laboratorio - SDA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f9ff; }
        .titulo {
            background-color: #0a3d62;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .card { transition: 0.3s; }
        .card:hover { transform: scale(1.03); }
        .precio {
            color: #0a3d62;
            font-weight: bold;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="titulo">
        <h1>Exámenes de Laboratorio</h1>
        <p>Laboratorio Clínico SDA</p>
    </div>

    <div class="container mt-5">
        <div class="row" id="lista-examenes">
            <div class="text-center w-100 mt-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Cargando exámenes...</p>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-primary">Volver al Inicio</a>
        </div>
    </div>

    <script>
        fetch('/api/examenes')
            .then(res => res.json())
            .then(examenes => {
                const contenedor = document.getElementById('lista-examenes');
                contenedor.innerHTML = '';

                examenes.forEach(examen => {
                    const precio = parseFloat(examen.precio).toLocaleString('es-CL', {
                        style: 'currency',
                        currency: 'CLP'
                    });

                    contenedor.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card p-3 h-100">
                                <h5>${examen.nombre}</h5>
                                <p class="text-muted">${examen.descripcion || ''}</p>
                                <p class="precio">${precio}</p>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('lista-examenes').innerHTML =
                    '<p class="text-danger text-center">Error al cargar los exámenes.</p>';
            });
    </script>

</body>
</html>
