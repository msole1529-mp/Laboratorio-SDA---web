<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Horas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f5f9ff;
    font-family:'Segoe UI',sans-serif;
}

.encabezado{
    background-color:#0a3d62;
    color:white;
    text-align:center;
    padding:30px;
}

.contenedor{
    max-width:900px;
    margin:40px auto;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.horario-btn{
    min-width:140px;
}

</style>

</head>
<body>

<div class="encabezado">
    <h1>Reserva de Horas Online</h1>
    <p>Laboratorio Clínico SDA</p>
</div>

<div class="contenedor">

<div class="card p-4">

    <div class="mb-3">
        <label class="form-label">Nombre Completo</label>
        <input type="text" id="nombre" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">RUT</label>
        <input type="text" id="rut" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Examen</label>

        <select id="examen" class="form-select">
            <option>Hemograma Completo</option>
            <option>Perfil Lipídico</option>
            <option>Perfil Bioquímico</option>
            <option>Glicemia</option>
            <option>Creatinina</option>
            <option>Examen de Orina</option>
            <option>TSH y T4 Libre</option>
        </select>
    </div>

    <div class="mb-4">
        <label class="form-label">Fecha</label>
        <input type="date" id="fecha" class="form-control">
    </div>

    <h4>Horario</h4>

    <div class="mb-3">
        <span class="badge bg-success">Disponible</span>
        <span class="badge bg-danger">Ocupado</span>
    </div>

    <div id="horarios" class="d-flex flex-wrap gap-2 mb-4"></div>

    <button class="btn btn-success mb-4" onclick="reservar()">
        Reservar Hora
    </button>

    <a href="/js/mis_reservas.html" class="btn btn-warning mb-4 ms-2">
        Ver Mis Reservas
    </a>

    <h4>Reserva Registrada</h4>

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Paciente</th>
                <th>Examen</th>
                <th>Fecha</th>
                <th>Horario</th>
            </tr>
        </thead>

        <tbody id="tablaReserva"></tbody>

    </table>

    <a href="/" class="btn btn-secondary">
        Volver al Inicio
    </a>

</div>

</div>

<script>

let horarioSeleccionado = "";

const horarios = [
"08:00 - 08:30",
"08:30 - 09:00",
"09:00 - 09:30",
"09:30 - 10:00",
"10:00 - 10:30",
"10:30 - 11:00",
"11:00 - 11:30",
"11:30 - 12:00",
"12:00 - 12:30",
"12:30 - 13:00",
"13:00 - 13:30",
"13:30 - 14:00",
"14:00 - 14:30",
"14:30 - 15:00",
"15:00 - 15:30",
"15:30 - 16:00",
"16:00 - 16:30",
"16:30 - 17:00",
"17:00 - 17:30",
"17:30 - 18:00"
];

const contenedor = document.getElementById("horarios");

horarios.forEach(hora => {

    const boton = document.createElement("button");

    boton.innerText = hora;

    boton.className = "btn btn-success horario-btn";

    boton.onclick = () => {

        if(boton.classList.contains("ocupado")){
            return;
        }

        horarioSeleccionado = hora;

        document.querySelectorAll("#horarios button")
        .forEach(b => {
            if(!b.classList.contains("ocupado")){
                b.classList.remove("btn-danger");
                b.classList.add("btn-success");
            }
        });

        boton.classList.remove("btn-success");
        boton.classList.add("btn-danger");
    };

    contenedor.appendChild(boton);

});

function reservar(){

    const nombre = document.getElementById("nombre").value;
    const rut = document.getElementById("rut").value;
    const examen = document.getElementById("examen").value;
    const fecha = document.getElementById("fecha").value;

    if(nombre === "" || rut === "" || fecha === ""){
        alert("Debe completar todos los campos");
        return;
    }

    if(horarioSeleccionado === ""){
        alert("Debe seleccionar un horario disponible");
        return;
    }

    document.querySelectorAll("#horarios button")
    .forEach(b => {

        if(b.innerText === horarioSeleccionado){

            b.classList.add("ocupado");

            b.classList.remove("btn-success");

            b.classList.add("btn-danger");

        }

    });

    document.getElementById("tablaReserva").innerHTML = `
        <tr>
            <td>${nombre}</td>
            <td>${examen}</td>
            <td>${fecha}</td>
            <td>${horarioSeleccionado}</td>
        </tr>
    `;

    alert("Reserva realizada correctamente");
}

</script>

</body>
</html>
