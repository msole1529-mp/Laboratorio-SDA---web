<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Horas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f9ff; font-family: 'Segoe UI', sans-serif; }
        .encabezado { background-color: #0a3d62; color: white; text-align: center; padding: 30px; }
        .contenedor { max-width: 900px; margin: 40px auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .horario-btn { min-width: 140px; }
        .examen-check:hover { background-color: #e8f0fe; }
    </style>
</head>
<body>

<div class="encabezado">
    <h1>Reserva de Horas Online</h1>
    <p>Laboratorio Clínico SDA</p>
</div>

<div class="contenedor">
<div class="card p-4">

    <div class="mb-3">
        <label class="form-label fw-bold">Nombre Completo</label>
        <input type="text" id="nombre" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">RUT</label>
        <input type="text" id="rut" class="form-control" placeholder="12345678-9" maxlength="10">
        <div id="msg-rut" class="text-danger mt-1" style="display:none;"></div>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">Selecciona tus Exámenes</label>
        <div id="lista-examenes" class="border rounded p-3" style="max-height:250px; overflow-y:auto;">
            <p class="text-muted">Cargando exámenes...</p>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">Fecha</label>
        <input type="date" id="fecha" class="form-control">
        <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="cargarHorarios()">Ver Horarios Disponibles</button>
    </div>

    <h5 class="fw-bold">Horario</h5>
    <div class="mb-3">
        <span class="badge bg-success">Disponible</span>
        <span class="badge bg-warning text-dark">Seleccionado</span>
        <span class="badge bg-danger">Ocupado</span>
    </div>
    <div id="horarios" class="d-flex flex-wrap gap-2 mb-4"></div>

    <button class="btn btn-success mb-4" onclick="reservar()">Reservar Hora</button>
    <a href="/js/mis_reservas.html" class="btn btn-warning mb-4 ms-2">Ver Mis Reservas</a>

    <div id="confirmacion" class="d-none">
        <h5 class="fw-bold">Reserva Registrada</h5>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Exámenes</th>
                    <th>Fecha</th>
                    <th>Horario</th>
                </tr>
            </thead>
            <tbody id="tablaReserva"></tbody>
        </table>
    </div>

    <a href="/" class="btn btn-secondary mt-2">Volver al Inicio</a>

</div>
</div>

<script>
let horarioSeleccionado = "";

// Los horarios ya no están fijos aquí; se cargan dinámicamente desde la base de datos

// ── Validar RUT ──────────────────────────────────────────
function validarRut(rut) {
    // Permitir cualquier RUT para facilitar pruebas con datos inventados
    return rut && rut.trim().length > 0;
}

// ── Formatear RUT automáticamente ───────────────────────
document.getElementById('rut').addEventListener('input', function() {
    let valor = this.value.replace(/[^0-9kK]/g, '').toUpperCase();
    if (valor.length > 1) {
        valor = valor.slice(0, -1) + '-' + valor.slice(-1);
    }
    this.value = valor;
    const msg = document.getElementById('msg-rut');
    if (valor.length > 3 && !validarRut(valor)) {
        msg.textContent = 'RUT inválido. Use el formato 12345678-9';
        msg.style.display = 'block';
    } else {
        msg.style.display = 'none';
    }
});

// ── Cargar exámenes ──────────────────────────────────────
fetch('/api/examenes')
    .then(res => res.json())
    .then(examenes => {
        const contenedor = document.getElementById('lista-examenes');
        contenedor.innerHTML = '';
        examenes.forEach(ex => {
            contenedor.innerHTML += `
                <div class="form-check examen-check p-2 rounded mb-1">
                    <input class="form-check-input" type="checkbox" value="${ex.id}" id="ex_${ex.id}">
                    <label class="form-check-label w-100" for="ex_${ex.id}">
                        <strong>${ex.nombre}</strong>
                        <span class="text-muted ms-2" style="font-size:0.85em">${ex.descripcion || ''}</span>
                    </label>
                </div>
            `;
        });
    });

// ── Cargar horarios dinámicamente desde la base de datos ────────────────
async function cargarHorarios() {
    const fecha = document.getElementById('fecha').value;
    if (!fecha) { alert('Seleccione una fecha primero'); return; }

    try {
        const resHorarios = await fetch(`/api/horarios?fecha=${fecha}`);
        const listaHorarios = await resHorarios.json();

        const resOcupados = await fetch(`/api/reservas/ocupados?fecha=${fecha}`);
        const ocupados = await resOcupados.json();

        const contenedor = document.getElementById('horarios');
        contenedor.innerHTML = '';
        horarioSeleccionado = '';

        const horariosActivos = listaHorarios.filter(h => h.activo === 1);

        if (horariosActivos.length === 0) {
            contenedor.innerHTML = '<p class="text-warning">No hay bloques de horarios de atención configurados o activos para este día.</p>';
            return;
        }

        horariosActivos.forEach(h => {
            const horaConfigurada = h.hora.slice(0, 5); // Obtener "HH:MM"
            const estaOcupado = ocupados.some(o => o.slice(0, 5) === horaConfigurada);

            const boton = document.createElement('button');
            boton.innerText = horaConfigurada;
            boton.className = `btn horario-btn ${estaOcupado ? 'btn-danger disabled' : 'btn-success'}`;
            boton.dataset.hora = `${horaConfigurada}:00`;

            if (!estaOcupado) {
                boton.onclick = () => {
                    document.querySelectorAll('#horarios button:not(.disabled)')
                        .forEach(b => { b.classList.remove('btn-warning'); b.classList.add('btn-success'); });
                    boton.classList.remove('btn-success');
                    boton.classList.add('btn-warning');
                    horarioSeleccionado = `${horaConfigurada}:00`;
                };
            }
            contenedor.appendChild(boton);
        });
    } catch (err) {
        console.error('Error al cargar horarios:', err);
        alert('Error al cargar la disponibilidad de horarios');
    }
}

// ── Reservar ─────────────────────────────────────────────
function reservar() {
    const nombre = document.getElementById('nombre').value.trim();
    const rut = document.getElementById('rut').value.trim();
    const fecha = document.getElementById('fecha').value;

    const examenesSeleccionados = [...document.querySelectorAll('#lista-examenes input:checked')]
        .map(cb => parseInt(cb.value));

    if (!nombre || !rut || !fecha) {
        alert('Debe completar todos los campos'); return;
    }
    if (!validarRut(rut)) {
        alert('El RUT ingresado no es válido. Use el formato 12345678-9'); return;
    }
    if (examenesSeleccionados.length === 0) {
        alert('Debe seleccionar al menos un examen'); return;
    }
    if (!horarioSeleccionado) {
        alert('Debe seleccionar un horario'); return;
    }

    fetch('/api/reservas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            nombre_paciente: nombre,
            rut,
            fecha,
            hora: horarioSeleccionado,
            examenes: examenesSeleccionados
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.ok) {
            const nombresExamenes = [...document.querySelectorAll('#lista-examenes input:checked')]
                .map(cb => document.querySelector(`label[for="${cb.id}"] strong`).innerText)
                .join(', ');

            document.getElementById('tablaReserva').innerHTML = `
                <tr>
                    <td>${nombre}</td>
                    <td>${nombresExamenes}</td>
                    <td>${fecha}</td>
                    <td>${horarioSeleccionado.slice(0,5)}</td>
                </tr>
            `;
            document.getElementById('confirmacion').classList.remove('d-none');
            alert(' Reserva realizada correctamente');
            cargarHorarios();
        } else {
            alert('Error al guardar la reserva');
        }
    })
    .catch(() => alert('Error de conexión'));
}
</script>

</body>
</html>
