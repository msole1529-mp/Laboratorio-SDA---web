<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Reservas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f5f9ff;
    font-family:'Segoe UI',sans-serif;
}

.encabezado{
    background-color:#0a3d62;
    color:white;
    text-align:center;
    padding:30px;
}

.contenedor{
    max-width:800px;
    margin:40px auto;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

#resultadoReserva{
    display:none;
}

</style>

</head>
<body>

<div class="encabezado">
    <h1>Mis Reservas</h1>
    <p>Laboratorio Clínico SDA</p>
</div>

<div class="contenedor">

<div class="card p-4 mb-4">

    <h4>Buscar Reserva</h4>

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" id="nombre" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">RUT</label>
        <input type="text" id="rut" class="form-control">
    </div>

    <button class="btn btn-primary" onclick="buscarReserva()">
        Buscar Reserva
    </button>

</div>

<div class="card p-4" id="resultadoReserva">

    <h4>Reserva Encontrada</h4>

    <hr>

    <p><strong>Paciente:</strong> <span id="datoNombre"></span></p>

    <p><strong>RUT:</strong> <span id="datoRut"></span></p>

    <p><strong>Examen:</strong> <span id="datoExamen"></span></p>

    <p><strong>Fecha:</strong> <span id="datoFecha"></span></p>

    <p><strong>Horario:</strong> <span id="datoHorario"></span></p>

    <hr>

    <button class="btn btn-warning" onclick="modificarReserva()">
        Modificar Reserva
    </button>

    <button class="btn btn-danger" onclick="cancelarReserva()">
        Cancelar Reserva
    </button>

</div>

<div class="mt-4">

    <a href="/" class="btn btn-secondary">
        Volver al Inicio
    </a>

</div>

</div>

<script>

function buscarReserva(){

    let nombre = document.getElementById("nombre").value;
    let rut = document.getElementById("rut").value;

    if(nombre === "" || rut === ""){
        alert("Debe ingresar Nombre y RUT");
        return;
    }

    document.getElementById("resultadoReserva").style.display = "block";

    document.getElementById("datoNombre").innerText = nombre;
    document.getElementById("datoRut").innerText = rut;

    document.getElementById("datoExamen").innerText =
        "Hemograma Completo";

    document.getElementById("datoFecha").innerText =
        "20/06/2026";

    document.getElementById("datoHorario").innerText =
        "10:00 - 10:30";
}

function modificarReserva(){

    let fecha = prompt("Ingrese la nueva fecha (ejemplo: 2026-06-25)");

    if(fecha === null || fecha === ""){
        return;
    }

    let hora = prompt(
        "Ingrese la nueva hora:\n\n" +
        "08:00 - 08:30\n" +
        "08:30 - 09:00\n" +
        "09:00 - 09:30\n" +
        "09:30 - 10:00\n" +
        "10:00 - 10:30\n" +
        "10:30 - 11:00\n" +
        "11:00 - 11:30\n" +
        "11:30 - 12:00\n" +
        "12:00 - 12:30\n" +
        "12:30 - 13:00\n" +
        "13:00 - 13:30\n" +
        "13:30 - 14:00\n" +
        "14:00 - 14:30\n" +
        "14:30 - 15:00\n" +
        "15:00 - 15:30\n" +
        "15:30 - 16:00\n" +
        "16:00 - 16:30\n" +
        "16:30 - 17:00\n" +
        "17:00 - 17:30\n" +
        "17:30 - 18:00"
    );

    if(hora === null || hora === ""){
        return;
    }

    if(hora === "10:00 - 10:30"){
        alert("La hora seleccionada está ocupada. Debe escoger otra.");
        return;
    }

    document.getElementById("datoFecha").innerText = fecha;
    document.getElementById("datoHorario").innerText = hora;

    alert("Reserva modificada correctamente.");
}

function cancelarReserva(){

    if(confirm("¿Desea cancelar la reserva?")){

        document.getElementById("resultadoReserva").style.display = "none";

        alert("Reserva cancelada correctamente.");
    }
}

</script>

</body>
</html>
