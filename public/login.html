<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Laboratorio SDA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0a3d62, #1e88e5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-login {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    .card-login h2 { color: #0a3d62; font-weight: 700; }
    .btn-ingresar { background-color: #0a3d62; color: white; width: 100%; padding: 10px; border-radius: 8px; font-weight: 600; }
    .btn-ingresar:hover { background-color: #1e88e5; color: white; }
    .alerta-error { display: none; }
    .link-volver { color: #1e88e5; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card-login bg-white">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
      <h2 class="mt-2">Acceso Admin</h2>
      <p class="text-muted small">Laboratorio Clínico SDA</p>
    </div>

    <!-- Alerta de error (JS la muestra si ?error=1 en la URL) -->
    <div class="alert alert-danger alerta-error" id="alerta-error">
      <i class="bi bi-exclamation-triangle me-2"></i>Usuario o contraseña incorrectos.
    </div>

    <form action="/auth/login" method="POST" id="form-login" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input type="text" name="usuario" id="input-usuario" class="form-control" placeholder="Ingresa tu usuario" required>
        <div class="invalid-feedback">El usuario es obligatorio.</div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" name="contrasena" id="input-contrasena" class="form-control" placeholder="Ingresa tu contraseña" required>
        <div class="invalid-feedback">La contraseña es obligatoria.</div>
      </div>
      <button type="submit" class="btn btn-ingresar">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/" class="link-volver"><i class="bi bi-arrow-left me-1"></i>Volver al sitio</a>
    </div>
  </div>

  <script>
    // Validación JS del formulario antes de enviar
    const form = document.getElementById('form-login');
    form.addEventListener('submit', function (e) {
      const usuario = document.getElementById('input-usuario').value.trim();
      const contrasena = document.getElementById('input-contrasena').value.trim();
      if (!usuario || !contrasena) {
        e.preventDefault();
        form.classList.add('was-validated');
      }
    });

    // Mostrar alerta si el servidor redirigió con ?error=1
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('alerta-error').style.display = 'block';
    }
  </script>
</body>
</html>
